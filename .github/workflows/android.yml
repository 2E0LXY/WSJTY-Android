name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew lintDebug --console=plain

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --console=plain

      - name: Rename APK for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/wsjty-remote-${GITHUB_REF_NAME}.apk"

      - name: Upload debug APK (build artifact)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
          body: |
            **Not signed for the Play Store** — this is a debug-signed APK, install it
            directly (you'll need to allow "install from unknown sources" once).

            Requires Android 8.0 (API 26) or newer. Pair it with WSJT-Y's
            **Tools → Configure Remote Control** (desktop) and, if using relay mode,
            a running [wsjty-relay](https://github.com/2E0LXY/wsjty-relay) instance.
